# =========================================================================
#             DANH SÁCH LỆNH DÀNH CHO NGƯỜI CHƠI (PLAYER COMMANDS)
# =========================================================================
# Danh sách này sẽ được hiển thị trên Bảng Điện Tử (Hologram)
player-commands:
  - "/bank - Mở tài khoản Ngân hàng cá nhân (Gửi/Rút tiền an toàn)"
  - "/reforge - Mở lò rèn Gacha (Tẩy luyện lại chỉ số trang bị)"
  - "/bazaar - Mở sàn giao dịch Chợ Đen (Mua bán vật phẩm)"
  - "/recipes - Xem sách hướng dẫn chế tạo vũ khí & đồ Custom"
  - "/cweupdate - Xem danh sách các bản cập nhật mới nhất của Server"
  - "(Mẹo: Click chuột phải vào Đe để sửa chữa/ép bùa)"
  - "(Mẹo: Tìm NPC Máy Giám Định để mở khóa sức mạnh trang bị)"
  
