player-commands:
  - "/bank - Mở giao diện Personal Bank Account cá nhân để gửi/rút tiền, xem lãi suất và lịch sử giao dịch."
  - "/reforge (hoặc /rf) - Mở giao diện Gacha Reforge nâng cấp chỉ số RPG đặc biệt cho trang bị cầm tay."
  - "/bazaar (hoặc /bz) - Mở sàn giao dịch Bazaar nông sản và khoáng sản động biến thiên liên tục."
  - "/cweupdate (hoặc /cwechangelog) - Xem thông tin bản cập nhật mới nhất và hướng dẫn tính năng máy chủ."